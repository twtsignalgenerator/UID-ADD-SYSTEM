<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TANVIR EXE | PREMIUM ACCESS</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #00f2fe;
      --secondary: #7000ff;
      --bg-dark: #020205;
      --card-bg: rgba(10, 10, 18, 0.7);
      --neon-shadow: 0 0 15px rgba(0, 242, 254, 0.4);
      --border: rgba(255, 255, 255, 0.1);
      --text-glow: 0 0 10px rgba(255, 255, 255, 0.2);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Rajdhani', sans-serif;
      background: var(--bg-dark);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .bg-animation {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at 50% 50%, #0f172a 0%, #020205 100%);
      z-index: -1;
    }
    .bg-animation::before {
      content: "";
      position: absolute;
      width: 200%; height: 200%;
      background-image: linear-gradient(rgba(0, 242, 254, 0.05) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(0, 242, 254, 0.05) 1px, transparent 1px);
      background-size: 50px 50px;
      transform: perspective(500px) rotateX(60deg) translateY(-100px);
      animation: gridMove 10s linear infinite;
    }
    @keyframes gridMove {
      0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
      100% { transform: perspective(500px) rotateX(60deg) translateY(50px); }
    }
    .container {
      width: 90%;
      max-width: 440px;
      padding: 45px;
      background: var(--card-bg);
      backdrop-filter: blur(15px);
      border-radius: 20px;
      border: 1px solid var(--border);
      position: relative;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(255,255,255,0.02);
      text-align: center;
      overflow: hidden;
    }
    .container::after {
      content: "";
      position: absolute;
      top: 0; left: 0; width: 100%; height: 3px;
      background: linear-gradient(90deg, transparent, var(--primary), var(--secondary), transparent);
    }
    .logo-box {
      width: 85px; height: 85px;
      margin: 0 auto 25px;
      background: rgba(255, 255, 255, 0.03);
      border: 2px solid var(--primary);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      box-shadow: var(--neon-shadow);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 10px rgba(0, 242, 254, 0.3); }
      50% { box-shadow: 0 0 25px rgba(0, 242, 254, 0.6); }
      100% { box-shadow: 0 0 10px rgba(0, 242, 254, 0.3); }
    }
    .logo-box i { font-size: 40px; color: var(--primary); text-shadow: var(--neon-shadow); }
    .title {
      font-family: 'Orbitron', sans-serif;
      font-size: 26px;
      font-weight: 900;
      letter-spacing: 2px;
      margin-bottom: 10px;
      text-transform: uppercase;
      background: linear-gradient(to right, #fff, var(--primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle {
      color: #94a3b8;
      font-size: 14px;
      margin-bottom: 35px;
      letter-spacing: 1px;
    }
    .input-group { text-align: left; margin-bottom: 30px; }
    .label {
      font-size: 11px;
      text-transform: uppercase;
      color: var(--primary);
      font-weight: 700;
      letter-spacing: 2px;
      margin-bottom: 10px;
      display: block;
    }
    .input-wrapper { position: relative; }
    .input {
      width: 100%;
      padding: 16px 15px 16px 50px;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: #fff;
      font-family: 'Rajdhani', sans-serif;
      font-size: 18px;
      font-weight: 600;
      transition: 0.3s;
    }
    .input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 15px rgba(0, 242, 254, 0.2);
      background: rgba(0, 0, 0, 0.6);
    }
    .input-icon {
      position: absolute;
      left: 18px; top: 50%;
      transform: translateY(-50%);
      color: var(--primary);
      font-size: 18px;
    }
    .btn {
      width: 100%;
      padding: 18px;
      background: linear-gradient(45deg, var(--secondary), var(--primary));
      border: none;
      border-radius: 12px;
      color: #fff;
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 2px;
      transition: 0.4s;
      box-shadow: 0 10px 20px rgba(112, 0, 255, 0.3);
      position: relative;
      overflow: hidden;
    }
    .btn::before {
      content: "";
      position: absolute;
      top: 0; left: -100%; width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      transition: 0.5s;
    }
    .btn:hover::before { left: 100%; }
    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 30px rgba(0, 242, 254, 0.4);
    }
    .footer {
      margin-top: 35px;
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      letter-spacing: 1px;
    }
    .footer b { color: var(--primary); }
    #message {
      margin-top: 20px;
      padding: 12px;
      border-radius: 10px;
      font-weight: 600;
      display: none;
      animation: fadeIn 0.3s;
    }
    .success { background: rgba(16, 185, 129, 0.15); color: #10b981; border: 1px solid #10b981; }
    .error { background: rgba(239, 68, 68, 0.15); color: #ef4444; border: 1px solid #ef4444; }
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
  </style>
</head>
<body>
  <div class="bg-animation"></div>
  <div class="container">
    <div class="logo-box">
      <i class="fas fa-gamepad"></i>
    </div>
    <h1 class="title">TANVIR EXE</h1>
    <p class="subtitle">GET 24H FREE ACCESS INSTANTLY</p>
    <form id="freeForm">
      <div class="input-group">
        <label class="label">User identification (UID)</label>
        <div class="input-wrapper">
          <i class="fas fa-microchip input-icon"></i>
          <input type="text" id="uid" class="input" placeholder="ENTER YOUR UID" required autocomplete="off">
        </div>
      </div>
      <button type="submit" class="btn" id="submitBtn">
        Activate System
      </button>
    </form>
    <div id="message"></div>
    <div class="footer">
      Developed by <b>TANVIR</b> | UID System v2.0
    </div>
  </div>
  <script>
    document.getElementById('freeForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const uid = document.getElementById('uid').value;
      const btn = document.getElementById('submitBtn');
      const msg = document.getElementById('message');
      btn.disabled = true;
      btn.innerText = 'AUTHENTICATING...';
      fetch('/claim_free_access', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: 'uid=' + encodeURIComponent(uid)
      })
      .then(r => r.json())
      .then(data => {
        msg.style.display = 'block';
        msg.innerText = data.message;
        msg.className = data.success ? 'success' : 'error';
        if (data.success) {
          document.getElementById('uid').value = '';
        }
      })
      .catch(err => {
        msg.style.display = 'block';
        msg.innerText = 'SYSTEM ERROR. TRY AGAIN.';
        msg.className = 'error';
      })
      .finally(() => {
        btn.disabled = false;
        btn.innerText = 'Activate System';
      });
    });
  </script>
</body>
</html>
