<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TANVIR EXE | Mobile Ready Access</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Space+Grotesk:wght@500;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary-neon: #00fff2;
      --bg-dark: #020205;
      --card-bg: rgba(15, 15, 20, 0.8);
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      margin: 0; padding: 0; box-sizing: border-box;
      font-family: 'Plus Jakarta Sans', sans-serif;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }

    body {
      min-height: 100vh;
      background-color: var(--bg-dark);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      color: #fff;
    }

    .bg-mesh {
      position: fixed; inset: 0; z-index: -1;
      background: 
        radial-gradient(circle at 10% 10%, rgba(0, 255, 242, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 90% 90%, rgba(0, 114, 255, 0.1) 0%, transparent 50%);
      filter: blur(60px);
    }

    #particles-js { position: fixed; width: 100%; height: 100%; z-index: 0; }

    .login-container {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 50px 40px;
      width: 95%;
      max-width: 550px;
      z-index: 10;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
      margin: 20px;
      position: relative;
      text-align: center;
    }

    /* Logo Box from Index.html */
    .logo-box {
      width: 90px; height: 90px;
      margin: 0 auto 20px;
      background: rgba(255, 255, 255, 0.03);
      border: 2px solid var(--primary-neon);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      animation: pulse 2s infinite;
      overflow: hidden;
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 10px rgba(0, 255, 242, 0.3); }
      50% { box-shadow: 0 0 25px rgba(0, 255, 242, 0.6); }
      100% { box-shadow: 0 0 10px rgba(0, 255, 242, 0.3); }
    }
    .logo-box img { width: 100%; height: 100%; object-fit: cover; }

    .login-header { margin-bottom: 30px; }
    .login-header h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 2.2rem; 
      font-weight: 800;
      background: linear-gradient(to right, #fff, var(--primary-neon));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 3px;
    }

    .login-header p {
      color: rgba(255, 255, 255, 0.5);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-top: 5px;
    }

    .form-group { margin-bottom: 20px; text-align: left; }
    .form-group input {
      width: 100%;
      padding: 18px 20px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      color: #fff;
      font-size: 16px;
      transition: var(--transition);
      outline: none;
    }

    .form-group input:focus {
      border-color: var(--primary-neon);
      background: rgba(0, 255, 242, 0.03);
      box-shadow: 0 0 15px rgba(0, 255, 242, 0.1);
    }

    .login-button {
      width: 100%; padding: 18px;
      background: linear-gradient(135deg, var(--primary-neon), #00c3ff);
      border: none; border-radius: 12px;
      color: #000; font-weight: 800; font-size: 1rem;
      letter-spacing: 1.5px; cursor: pointer; transition: var(--transition);
      margin-top: 10px;
    }

    .login-button:active { transform: scale(0.98); }
    .forgot-password { text-align: center; margin-top: 20px; }
    .forgot-password a { color: rgba(255, 255, 255, 0.3); text-decoration: none; font-size: 0.8rem; }

    #loadingOverlay {
      position: fixed; inset: 0; background: rgba(2, 2, 5, 0.95);
      z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center;
    }

    .loader-ring {
      width: 50px; height: 50px; border: 3px solid rgba(0, 255, 242, 0.1);
      border-top: 3px solid var(--primary-neon); border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body oncontextmenu="return false;">

<div class="bg-mesh"></div>
<div id="particles-js"></div>

<div id="loadingOverlay">
  <div class="loader-ring"></div>
  <p style="margin-top:15px; font-size: 0.6rem; color: var(--primary-neon); letter-spacing: 3px;">CONNECTING...</p>
</div>

<div class="login-container">
  <div class="logo-box">
    <img src="https://conservative-jade-ehhax2y45k.edgeone.app/Tanvir%20Exe.png" alt="Logo">
  </div>
  <div class="login-header">
    <h1>TANVIR EXE</h1>
    <p>Premium Uid Management</p>
  </div>
  
  <form method="POST" action="/" onsubmit="showLoading()">
    <div class="form-group">
      <input type="text" name="username" placeholder="USER ID" required autocomplete="off">
    </div>
    <div class="form-group">
      <input type="password" name="password" placeholder="PASSKEY" required>
    </div>
    <button type="submit" class="login-button">LOG IN</button>
    <div class="forgot-password">
      <a href="#">RECOVER ACCESS</a>
    </div>
  </form>
</div>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script>
  particlesJS('particles-js', {
    particles: {
      number: { value: 40, density: { enable: true, value_area: 800 } },
      color: { value: '#00fff2' },
      opacity: { value: 0.3 },
      size: { value: 1.5 },
      line_linked: { enable: true, distance: 120, color: '#00fff2', opacity: 0.1 },
      move: { enable: true, speed: 0.6 }
    },
    interactivity: { events: { onclick: { enable: true, mode: 'push' } } },
    retina_detect: true
  });

  function showLoading() { document.getElementById("loadingOverlay").style.display = "flex"; }

  document.onkeydown = function(e) {
    if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 'I'.charCodeAt(0) || e.keyCode == 'J'.charCodeAt(0) || e.keyCode == 'C'.charCodeAt(0))) || (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) || (e.ctrlKey && e.keyCode == 'S'.charCodeAt(0))) {
      return false;
    }
  };
</script>

</body>
</html>
